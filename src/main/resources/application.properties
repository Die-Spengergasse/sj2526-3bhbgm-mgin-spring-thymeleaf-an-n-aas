# main configuration file for the Spring Boot application
spring.application.name=spring_thymeleaf
# man könnte server.port=9090 setzen, damit der Server auf Port 9090 läuft,
# aber das ist nicht nötig, weil 8080 der standardport ist
# datenbankverbindung
# verbindet sich mit der MySQL-Datenbank
spring.datasource.url=jdbc:mysql://localhost:3306/haustierverwaltung_mgin
# die folgenden Zeilen geben die Zugangsdaten für die Datenbank an
spring.datasource.username=root
spring.datasource.password=
#    treiber für die verbindung
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# hibernate-einstellungen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
